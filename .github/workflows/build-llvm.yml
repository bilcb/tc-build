  package:
    needs: build-binutils
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: bash build.sh deps
      - name: Restore install cache
        uses: actions/cache/restore@v5
        with:
          path: install.tar.gz
          key: install-${{ github.run_id }}-binutils
      - name: Restore install
        run: |
          tar -xzf install.tar.gz
          rm install.tar.gz
      - name: Optimize toolchain
        run: bash build.sh fixup
      - name: Package toolchain
        run: bash build.sh pack
      - name: Generate revision info
        run: bash build.sh revision
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: clang-${{ env.CLANG_VERSION }}
          body_path: revision_info.md
          files: clang.tar.gz
