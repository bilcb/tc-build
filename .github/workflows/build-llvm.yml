name: Build LLVM
on:
  workflow_dispatch:

jobs:
  build-llvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: bash build.sh deps
      - name: Build LLVM
        run: bash build.sh llvm
      - name: Save install cache
        run: tar -czf install.tar.gz --owner=0 --group=0 --numeric-owner -C . install
      - uses: actions/cache/save@v5
        with:
          path: install.tar.gz
          key: install-${{ github.run_id }}-llvm

  build-binutils:
    needs: build-llvm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: bash build.sh deps
      - name: Restore install cache
        uses: actions/cache/restore@v5
        with:
          path: install.tar.gz
          key: install-${{ github.run_id }}-llvm
      - name: Restore install
        run: |
          tar -xzf install.tar.gz
          rm install.tar.gz
      - name: Build binutils
        run: bash build.sh binutils
        env:
          CC: ${{ github.workspace }}/install/bin/clang
          CXX: ${{ github.workspace }}/install/bin/clang++
          LD: ${{ github.workspace }}/install/bin/lld
          AR: ${{ github.workspace }}/install/bin/llvm-ar
          NM: ${{ github.workspace }}/install/bin/llvm-nm
          RANLIB: ${{ github.workspace }}/install/bin/llvm-ranlib
      - name: Save install cache
        run: tar -czf install.tar.gz --owner=0 --group=0 --numeric-owner -C . install
      - uses: actions/cache/save@v5
        with:
          path: install.tar.gz
          key: install-${{ github.run_id }}-binutils

